name: Game screenshots

# Spawns an OpenAI Codex agent that drives a real browser (via the Playwright
# MCP server), plays a live game of the deployed app, screenshots it, and posts
# the images to Discord. Runs on every push to master and on manual dispatch.
#
# Required repository secrets:
#   CODEX_AUTH_JSON      contents of a local ~/.codex/auth.json (ChatGPT/Codex
#                        subscription login) used to authenticate Codex in CI
#   OPENROUTER_API_KEY   drives the game's AI turns (free-model rotation)
#   DISCORD_WEBHOOK_URL   channel webhook the screenshots are posted to
#
# Codex is pinned to the version that produced the auth.json so the token
# format matches. If the stored refresh token ever goes stale, re-run
# `codex login` locally and update the CODEX_AUTH_JSON secret.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      url:
        description: "Deployed app URL to screenshot"
        default: "https://openhistoria.vercel.app"

concurrency:
  group: game-screenshots
  cancel-in-progress: true

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      APP_URL: ${{ github.event.inputs.url || 'https://openhistoria.vercel.app' }}
      SHOTS_DIR: ${{ github.workspace }}/screenshots
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preflight (fail early if secrets are missing)
        run: |
          missing=0
          for v in CODEX_AUTH_JSON OPENROUTER_API_KEY DISCORD_WEBHOOK_URL; do
            if [ -z "${!v}" ]; then echo "::error::Missing repository secret: $v"; missing=1; fi
          done
          [ "$missing" = "0" ]

      - name: Install Codex CLI
        # npm "latest" is 0.139.0, matching the CLI that produced
        # CODEX_AUTH_JSON. (An explicit @version spec trips an npm parse bug.)
        run: npm install -g @openai/codex

      - name: Authenticate Codex with the subscription login
        run: |
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
          # Sanity: confirm it parses and is ChatGPT-token auth (no secrets printed).
          node -e "const a=require('$HOME/.codex/auth.json');console.log('auth_mode:',a.auth_mode,'| has tokens:',!!a.tokens)"

      - name: Install Chromium + system deps for Playwright
        run: npx --yes playwright install --with-deps chromium

      - name: Configure Codex with the Playwright browser MCP
        run: |
          mkdir -p "$HOME/.codex" "$SHOTS_DIR"
          cat > "$HOME/.codex/config.toml" <<EOF
          # Headless Chromium exposed to Codex as browser tools; screenshots are
          # written to the output dir below.
          [mcp_servers.playwright]
          command = "npx"
          # Use the Google Chrome preinstalled on the runner (the "chrome"
          # channel), avoiding a Playwright-bundled-chromium version mismatch.
          args = [
            "-y", "@playwright/mcp@latest",
            "--headless", "--isolated", "--no-sandbox",
            "--browser", "chrome",
            "--viewport-size", "1280,800",
            "--output-dir", "$SHOTS_DIR",
          ]
          startup_timeout_sec = 120
          EOF
          echo "Codex config:"; cat "$HOME/.codex/config.toml"

      - name: Run the Codex browser agent
        run: |
          PROMPT="$(cat .github/codex/screenshot-game.md)"
          # Append the target URL with the key in the (server-invisible) hash.
          PROMPT="${PROMPT}

          Target URL (open this first): ${APP_URL}#or_key=${OPENROUTER_API_KEY}"
          codex exec \
            --dangerously-bypass-approvals-and-sandbox \
            --skip-git-repo-check \
            "$PROMPT"

      - name: List captured screenshots
        if: always()
        run: ls -la "$SHOTS_DIR" || true

      - name: Post screenshots to Discord
        if: always()
        run: node .github/scripts/post-to-discord.mjs "$SHOTS_DIR"

      - name: Upload screenshots as a build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: game-screenshots
          path: ${{ env.SHOTS_DIR }}/*
          if-no-files-found: warn
